ic, 3d sculpture, bokeh, long exposure, art noveau, artistic sketch,  film still, body paint, shallow depth of field, dithering, animation style of Alberto Mielgo</code> etc. From here, interesting images were cherry picked and exhibited in the show.</p>\n<p>In 2026, the Latent Latex piece curates selections from LOVE.STADT, sorts them by high dimensional visual similarity, and creates a smooth latent travel animation, morphing between each image resulting in a smooth, sublime animation</p>\n","id":"LOVESTADT"}
